<!DOCTYPE html>
<html lang="{{ site.Language.LanguageCode }}" dir="{{ or site.Language.LanguageDirection `ltr` }}">
<head>
  {{- /* Instant dark mode to prevent flash */ -}}
  <script>
    (function() {
      var theme = localStorage.getItem('heo-theme') || 'light';
      document.documentElement.setAttribute('data-theme', theme);
    })();
  </script>
  {{ partial "head.html" . }}
</head>
<body>
  {{ partial "header.html" . }}

  <main>
    {{ block "main" . }}{{ end }}
  </main>

  {{ partial "footer.html" . }}

  <!-- Back to Top -->
  <button class="heo-back-top" id="backToTop" aria-label="回到顶部">
    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="18 15 12 9 6 15"/></svg>
  </button>

  <!-- Search Overlay -->
  <div class="heo-search-overlay" id="searchOverlay">
    <div class="heo-search-box">
      <div class="heo-search-input-wrap">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
        <input type="text" class="heo-search-input" id="searchInput" placeholder="搜索文章..." autocomplete="off" />
      </div>
      <div class="heo-search-results" id="searchResults"></div>
    </div>
  </div>

  {{- $js := resources.Get "js/main.js" | minify | fingerprint -}}
  <script src="{{ $js.RelPermalink }}"></script>
</body>
</html>
