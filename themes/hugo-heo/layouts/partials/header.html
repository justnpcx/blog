<nav class="heo-nav" id="heoNav">
  <div class="heo-nav-inner">
    <!-- Logo -->
    <a href="{{ "/" | relURL }}" class="heo-nav-logo" aria-label="首页">
      <span class="heo-nav-logo-icon">⚡</span>
      <span>{{ site.Title }}</span>
    </a>

    <!-- Menu -->
    <ul class="heo-nav-menu" id="navMenu">
      {{ range site.Menus.main }}
      <li>
        <a href="{{ .URL | relURL }}"{{ if $.IsMenuCurrent "main" . }} class="active"{{ end }}>
          {{ .Name }}
        </a>
      </li>
      {{ end }}
    </ul>

    <!-- Actions -->
    <div class="heo-nav-actions">
      <!-- Search -->
      <button class="heo-nav-action-btn" id="searchToggle" aria-label="搜索">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
      </button>

      <!-- Dark mode -->
      <button class="heo-nav-action-btn" id="themeToggle" aria-label="切换深色模式">
        <svg class="icon-sun" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/></svg>
        <svg class="icon-moon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="display:none"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
      </button>

      <!-- Mobile toggle -->
      <button class="heo-mobile-toggle" id="mobileToggle" aria-label="菜单">
        <span></span>
        <span></span>
        <span></span>
      </button>
    </div>
  </div>
</nav>
