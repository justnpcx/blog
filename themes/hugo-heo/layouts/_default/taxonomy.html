{{ define "main" }}
<div class="heo-container">
  <header class="heo-archive-header animate-fade-in-up">
    <h1 class="heo-archive-title">{{ .Title }}</h1>
    <div class="heo-archive-count">探索所有分类和标签</div>
  </header>

  <div class="heo-layout">
    <div class="heo-main-content animate-fade-in-up" style="animation-delay: 0.1s">
      <div class="heo-card" style="padding: 30px; background: var(--heo-card-bg); border-radius: var(--heo-radius-lg); border: 1px solid var(--heo-card-border);">
        <div class="heo-tag-cloud" style="gap: 12px; font-size: 1.1rem;">
          {{ range .Data.Terms.ByCount }}
          <a href="{{ .Page.RelPermalink }}" style="padding: 8px 16px;">
            {{ .Page.Title }} <span style="opacity: 0.7; font-size: 0.8em; margin-left: 4px;">{{ .Count }}</span>
          </a>
          {{ end }}
        </div>
      </div>
    </div>

    <aside class="heo-sidebar">
      {{ partial "sidebar.html" . }}
    </aside>
  </div>
</div>
{{ end }}
