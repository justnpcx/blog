{{ define "main" }}
<div class="heo-container">
  <header class="heo-archive-header animate-fade-in-up">
    <h1 class="heo-archive-title">{{ .Title }}</h1>
    <div class="heo-archive-count">包含此标签的文章（{{ len .Data.Pages }} 篇）</div>
  </header>

  <div class="heo-layout">
    <div class="heo-main-content">
      <div class="heo-post-grid stagger">
        {{ $paginator := .Paginate .Data.Pages }}
        {{ range $paginator.Pages }}
          {{ partial "post-card.html" . }}
        {{ end }}
      </div>

      {{ partial "pagination.html" . }}
    </div>

    <aside class="heo-sidebar">
      {{ partial "sidebar.html" . }}
    </aside>
  </div>
</div>
{{ end }}
