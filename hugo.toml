baseURL = 'https://blog.justnpc.com/'
title = '⚡ JustNPC'
theme = 'hugo-trainsh'
paginate = 10
enableEmoji = true

defaultContentLanguage = 'zh-cn'
defaultContentLanguageInSubdir = false

[markup]
  [markup.highlight]
    noClasses = true
  [markup.goldmark]
    [markup.goldmark.renderer]
      unsafe = true

[languages]
  [languages.zh-cn]
    languageCode = 'zh-CN'
    languageName = '简体中文'
    weight = 1
    title = '⚡ JustNPC'

    [[languages.zh-cn.menu.main]]
      name = '🏠 首页'
      pageRef = '/'
      weight = 1

    [[languages.zh-cn.menu.main]]
      name = '📝 博客'
      pageRef = '/blog'
      weight = 2

    [[languages.zh-cn.menu.main]]
      name = '🏷️ 标签'
      pageRef = '/tags'
      weight = 3

[params]
  mainSections = ['posts']
  description = '一个 NPC 的觉醒日志——探索认知边界、系统思维与灵性智慧的交汇之地。'
  author = 'JustNPC'
  DateFormat = '2006-01-02'

  [params.home]
    intro = """
🎮 **不是主角，但正在觉醒。**

在代码与哲学的交汇处，探索认知的边界。
用第一性原理拆解问题，用灵性智慧重构实相。

> *"地图不是疆域，但我正在重绘我的地图。"*
"""

    [params.home.recent]
      limit = 5

    [params.home.feed]
      enabled = true

  [params.footer]
    [params.footer.social]
      github = 'https://github.com/justnpcx'
      email = 'mailto:justnpcx@gmail.com'

  [params.waline]
    serverURL = 'https://npc-comments-a12w.vercel.app' # 填入实际的 Vercel 域名
    emoji = ['https://unpkg.com/@waline/emojis@1.1.0/weibo']
    dark = 'html[data-dark-theme="dark"]' # 适配 trainsh 的暗色模式
    search = false

[outputs]
  home = ['HTML', 'RSS', 'JSON']
