baseURL = 'https://blog.justnpc.com/'
title = 'JustNPC'
theme = 'stack'
paginate = 10
enableEmoji = true

defaultContentLanguage = 'zh-cn'
defaultContentLanguageInSubdir = false

[markup]
  [markup.highlight]
    noClasses = true
  [markup.goldmark]
    [markup.goldmark.renderer]
      unsafe = true

[languages]
  [languages.zh-cn]
    languageCode = 'zh-CN'
    languageName = '简体中文'
    weight = 1
    title = 'JustNPC'

    [[languages.zh-cn.menu.main]]
      name = '首页'
      url = '/'
      weight = 1

    [[languages.zh-cn.menu.main]]
      name = '文章'
      url = '/posts/'
      weight = 2

    [[languages.zh-cn.menu.main]]
      name = '分类'
      url = '/categories/'
      weight = 3

    [[languages.zh-cn.menu.main]]
      name = '标签'
      url = '/tags/'
      weight = 4

    [[languages.zh-cn.menu.main]]
      name = '关于'
      url = '/about/'
      weight = 5

[params]
  mainSections = ['posts']
  description = '一个 NPC 的觉醒日志——探索认知边界、系统思维与灵性智慧的交汇之地。'
  author = 'JustNPC'
  avatar = '/images/avatar.jpg'
  DateFormat = '2006-01-02'
  startDate = '2026-06-26'

  # NPC 专属参数
  [params.npc]
    level = 1
    title = '初级觉醒者'
    systemVersion = 'v0.3.1'
    attributes = [
      { name = '认知', value = 65, icon = '🧠' },
      { name = '洞察', value = 58, icon = '👁️' },
      { name = '心性', value = 72, icon = '🧘' },
      { name = '表达', value = 45, icon = '✍️' }
    ]
    mottos = [
      '地图不是疆域，但我正在重绘我的地图。',
      '在代码与哲学的交汇处，探索认知的边界。',
      '不是主角，但正在觉醒。',
      '用第一性原理拆解问题，用灵性智慧重构实相。',
      '每一行代码都是一次自我对话。',
      '系统之外，还有更大的系统。'
    ]

  [params.sidebar]
    compact = false
    avatar = '/images/avatar.jpg'
    subtitle = '初级觉醒者 · 探索认知边界'
    emoji = '⚡'

  [params.article]
    headingAnchor = true
    math = false
    toc = true
    readingTime = true

    [params.article.list]
      showTags = true

  [params.footer]
    since = 2026
    customText = 'Crafted with ◆ by JustNPC'

  [params.colorScheme]
    toggle = true
    default = 'auto'

  [params.dateFormat]
    published = ':date_full'
    lastUpdated = ':date_full'

  [params.comments]
    enabled = true
    provider = 'waline'

    [params.comments.waline]
      serverURL = 'https://npc-comments-a12w.vercel.app'
      lang = 'zh-CN'
      emoji = ['https://unpkg.com/@waline/emojis@1.1.0/weibo']

[outputs]
  home = ['HTML', 'RSS', 'JSON']
