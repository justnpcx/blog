baseURL = 'https://blog.justnpc.com/'
title = '⚡ JustNPC'
theme = 'hugo-heo'
paginate = 10
enableEmoji = true

defaultContentLanguage = 'zh-cn'
defaultContentLanguageInSubdir = false

[markup]
  [markup.highlight]
    noClasses = true
  [markup.goldmark]
    [markup.goldmark.renderer]
      unsafe = true

[languages]
  [languages.zh-cn]
    languageCode = 'zh-CN'
    languageName = '简体中文'
    weight = 1
    title = '⚡ JustNPC'

    [[languages.zh-cn.menu.main]]
      name = '🏠 首页'
      url = '/'
      weight = 1

    [[languages.zh-cn.menu.main]]
      name = '文库'
      identifier = 'library'
      weight = 2

    [[languages.zh-cn.menu.main]]
      name = '全部文章'
      parent = 'library'
      url = '/posts/'
      weight = 1

    [[languages.zh-cn.menu.main]]
      name = '分类列表'
      parent = 'library'
      url = '/categories/'
      weight = 2

    [[languages.zh-cn.menu.main]]
      name = '标签列表'
      parent = 'library'
      url = '/tags/'
      weight = 3

    [[languages.zh-cn.menu.main]]
      name = '专栏'
      identifier = 'columns'
      weight = 3

    [[languages.zh-cn.menu.main]]
      name = '技术分享'
      parent = 'columns'
      url = '/categories/tech/'
      weight = 1

    [[languages.zh-cn.menu.main]]
      name = '生活日志'
      parent = 'columns'
      url = '/categories/life/'
      weight = 2

    [[languages.zh-cn.menu.main]]
      name = '关于'
      identifier = 'about'
      weight = 4

    [[languages.zh-cn.menu.main]]
      name = '关于本站'
      parent = 'about'
      url = '/about/'
      weight = 1

[params]
  mainSections = ['posts']
  description = '一个 NPC 的觉醒日志——探索认知边界、系统思维与灵性智慧的交汇之地。'
  author = 'JustNPC'
  avatar = '/images/avatar.jpg'
  DateFormat = '2006-01-02'
  startDate = '2026-06-26'  # 博客建立日期，用于计算运行天数

  # NPC 专属参数
  [params.npc]
    level = 1                    # 觉醒等级
    title = '初级觉醒者'          # 当前称号
    systemVersion = 'v0.3.1'     # 当前系统版本
    attributes = [               # 属性面板
      { name = '认知', value = 65, icon = '🧠' },
      { name = '洞察', value = 58, icon = '👁️' },
      { name = '心性', value = 72, icon = '🧘' },
      { name = '表达', value = 45, icon = '✍️' }
    ]
    mottos = [                   # 随机箴言
      '地图不是疆域，但我正在重绘我的地图。',
      '在代码与哲学的交汇处，探索认知的边界。',
      '不是主角，但正在觉醒。',
      '用第一性原理拆解问题，用灵性智慧重构实相。',
      '每一行代码都是一次自我对话。',
      '系统之外，还有更大的系统。'
    ]

  [params.home]
    intro = """
🎮 **不是主角，但正在觉醒。**

在代码与哲学的交汇处，探索认知的边界。
用第一性原理拆解问题，用灵性智慧重构实相。

> *"地图不是疆域，但我正在重绘我的地图。"*
"""

    [params.home.recent]
      limit = 5

    [params.home.feed]
      enabled = true

  [params.footer]
    [params.footer.social]
      github = 'https://github.com/justnpcx'
      email = 'mailto:justnpcx@gmail.com'

  [params.waline]
    serverURL = 'https://npc-comments-a12w.vercel.app' # 填入实际的 Vercel 域名
    emoji = ['https://unpkg.com/@waline/emojis@1.1.0/weibo']
    dark = 'html[data-theme="dark"]' # 适配 heo 的暗色模式
    search = false

[outputs]
  home = ['HTML', 'RSS', 'JSON']
