name: Deploy Hugo Blog to Cloudflare

on:
  push:
    branches:
      - main
  workflow_dispatch: # 顺便开启手动触发开关，方便调试

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v4
        with:
          submodules: true
          fetch-depth: 0

      - name: Setup Hugo Extended
        uses: peaceiris/actions-hugo@v3
        with:
          hugo-version: '0.163.2'
          extended: true

      - name: Build Static Assets
        run: hugo --gc --minify

      # 用最原生的 Node.js 脚本，直接绕过第三方封装插件
      - name: Install Wrangler Globally
        run: npm install -g wrangler

      - name: Publish to Cloudflare Pages via Native CLI
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: wrangler pages deploy public --project-name=blog