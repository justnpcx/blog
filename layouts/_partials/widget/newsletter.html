{{/* 自定义小组件：订阅 CTA（承诺一致原则）
     在 hugo.yaml 的 widgets.homepage / widgets.page 中以 type: newsletter 启用 */}}
{{- $nl := .Context.Site.Params.newsletter }}
{{- if and $nl $nl.enabled }}
<section class="widget newsletter-widget">
    <h2 class="widget-title section-title">{{ $nl.title | default "订阅更新" }}</h2>
    <div class="widget--body">
        <p class="newsletter-desc">{{ $nl.desc }}</p>
        <form action="{{ $nl.formAction }}" method="post" target="_blank" class="newsletter-form">
            <input type="email" name="email" placeholder="your@email.com" required aria-label="邮箱地址">
            <button type="submit">{{ $nl.buttonText | default "订阅" }}</button>
        </form>
        <p class="newsletter-note">{{ $nl.note }}</p>
    </div>
</section>
{{- end }}
