<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>方案 3：像素觉醒</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; image-rendering: pixelated; }
  body {
    background: #0F380F;
    color: #9BBC0F;
    font-family: 'Press Start 2P', 'Courier New', monospace;
    line-height: 1.6;
    padding: 20px;
  }
  .game-container {
    max-width: 800px;
    margin: 0 auto;
    border: 4px solid #8BAC0F;
    background: #0F380F;
    box-shadow: 0 0 0 4px #306230, 0 0 20px rgba(155, 188, 15, 0.3);
  }
  .game-header {
    background: #306230;
    padding: 15px 20px;
    display: flex;
    align-items: center;
    gap: 15px;
    border-bottom: 4px solid #8BAC0F;
  }
  .avatar {
    width: 48px;
    height: 48px;
    background: #8BAC0F;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 24px;
    border: 3px solid #9BBC0F;
  }
  .player-info h1 {
    font-size: 1rem;
    color: #9BBC0F;
    margin-bottom: 5px;
  }
  .player-info .level {
    font-size: 0.7rem;
    color: #8BAC0F;
  }
  .stats-bar {
    display: flex;
    gap: 20px;
    padding: 15px 20px;
    background: #0F380F;
    border-bottom: 2px solid #306230;
  }
  .stat {
    flex: 1;
  }
  .stat-name {
    font-size: 0.6rem;
    color: #8BAC0F;
    margin-bottom: 5px;
    display: flex;
    justify-content: space-between;
  }
  .stat-track {
    height: 12px;
    background: #306230;
    border: 2px solid #8BAC0F;
    overflow: hidden;
  }
  .stat-fill {
    height: 100%;
    background: repeating-linear-gradient(
      90deg,
      #9BBC0F,
      #9BBC0F 4px,
      #8BAC0F 4px,
      #8BAC0F 8px
    );
    transition: width 0.3s;
  }
  .stage-select {
    padding: 20px;
  }
  .stage-title {
    font-size: 0.8rem;
    color: #9BBC0F;
    margin-bottom: 15px;
    text-align: center;
  }
  .stages {
    display: grid;
    grid-template-columns: repeat(2, 1fr);
    gap: 15px;
  }
  .stage {
    background: #306230;
    border: 3px solid #8BAC0F;
    padding: 15px;
    text-align: center;
    cursor: pointer;
    transition: all 0.2s;
  }
  .stage:hover {
    background: #8BAC0F;
    transform: scale(1.02);
  }
  .stage:hover .stage-name { color: #0F380F; }
  .stage-icon {
    font-size: 2rem;
    margin-bottom: 10px;
  }
  .stage-name {
    font-size: 0.7rem;
    color: #9BBC0F;
    margin-bottom: 8px;
    line-height: 1.4;
  }
  .stage-difficulty {
    font-size: 0.6rem;
    color: #8BAC0F;
  }
  .inventory {
    padding: 20px;
    background: #306230;
    border-top: 4px solid #8BAC0F;
  }
  .inventory-title {
    font-size: 0.7rem;
    color: #9BBC0F;
    margin-bottom: 10px;
  }
  .items {
    display: flex;
    gap: 10px;
    flex-wrap: wrap;
  }
  .item {
    background: #0F380F;
    border: 2px solid #8BAC0F;
    padding: 8px 12px;
    font-size: 0.6rem;
    color: #9BBC0F;
  }
  .motto-box {
    padding: 20px;
    text-align: center;
    border-top: 2px solid #306230;
  }
  .motto-text {
    font-size: 0.7rem;
    color: #8BAC0F;
    line-height: 1.8;
  }
</style>
</head>
<body>
<div class="game-container">
  <div class="game-header">
    <div class="avatar">🎮</div>
    <div class="player-info">
      <h1>JUSTNPC.EXE</h1>
      <div class="level">LV.1 初级觉醒者</div>
    </div>
  </div>
  
  <div class="stats-bar">
    <div class="stat">
      <div class="stat-name"><span>🧠 认知</span><span>65</span></div>
      <div class="stat-track"><div class="stat-fill" style="width: 65%"></div></div>
    </div>
    <div class="stat">
      <div class="stat-name"><span>👁️ 洞察</span><span>58</span></div>
      <div class="stat-track"><div class="stat-fill" style="width: 58%"></div></div>
    </div>
    <div class="stat">
      <div class="stat-name"><span>🧘 心性</span><span>72</span></div>
      <div class="stat-track"><div class="stat-fill" style="width: 72%"></div></div>
    </div>
    <div class="stat">
      <div class="stat-name"><span>✍️ 表达</span><span>45</span></div>
      <div class="stat-track"><div class="stat-fill" style="width: 45%"></div></div>
    </div>
  </div>
  
  <div class="stage-select">
    <div class="stage-title">— SELECT STAGE —</div>
    <div class="stages">
      <div class="stage">
        <div class="stage-icon">🧠</div>
        <div class="stage-name">解码人性：影响力七大支柱与破局的"道与术"</div>
        <div class="stage-difficulty">★★★☆☆</div>
      </div>
      <div class="stage">
        <div class="stage-icon">🔮</div>
        <div class="stage-name">解码实相：从认识论到灵性智慧</div>
        <div class="stage-difficulty">★★☆☆☆</div>
      </div>
    </div>
  </div>
  
  <div class="inventory">
    <div class="inventory-title">INVENTORY (标签)</div>
    <div class="items">
      <div class="item">心理学</div>
      <div class="item">影响力</div>
      <div class="item">认知</div>
      <div class="item">NLP</div>
      <div class="item">哲学</div>
      <div class="item">破局</div>
    </div>
  </div>
  
  <div class="motto-box">
    <div class="motto-text">"地图不是疆域，但我正在重绘我的地图。"</div>
  </div>
</div>
</body>
</html>
