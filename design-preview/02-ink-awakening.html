<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>方案 2：墨韵觉醒</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #F5F0E8;
    color: #1A1A1A;
    font-family: 'Noto Serif SC', 'STSong', serif;
    line-height: 1.8;
  }
  .container {
    max-width: 800px;
    margin: 0 auto;
    padding: 40px 20px;
  }
  .header {
    text-align: center;
    padding: 60px 0;
    border-bottom: 1px solid #D4C5B0;
    margin-bottom: 40px;
  }
  .title {
    font-size: 2.5rem;
    font-weight: 400;
    letter-spacing: 12px;
    margin-bottom: 16px;
    color: #1A1A1A;
  }
  .subtitle {
    font-size: 0.9rem;
    color: #8B7D6B;
    letter-spacing: 4px;
  }
  .ink-circle {
    width: 60px;
    height: 60px;
    border: 2px solid #1A1A1A;
    border-radius: 50%;
    margin: 30px auto;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 1.5rem;
  }
  .article-list {
    display: flex;
    flex-direction: column;
    gap: 30px;
  }
  .article-card {
    background: #FDFCF8;
    border: 1px solid #E8E0D0;
    padding: 30px;
    position: relative;
    transition: all 0.3s;
  }
  .article-card:hover {
    box-shadow: 0 4px 20px rgba(0,0,0,0.08);
    transform: translateY(-2px);
  }
  .article-card::before {
    content: '';
    position: absolute;
    left: 0;
    top: 0;
    bottom: 0;
    width: 4px;
    background: #C41E3A;
  }
  .article-category {
    display: inline-block;
    background: #C41E3A;
    color: #F5F0E8;
    padding: 4px 12px;
    font-size: 0.75rem;
    letter-spacing: 2px;
    margin-bottom: 12px;
  }
  .article-title {
    font-size: 1.4rem;
    font-weight: 400;
    line-height: 1.5;
    margin-bottom: 12px;
  }
  .article-meta {
    font-size: 0.85rem;
    color: #8B7D6B;
    display: flex;
    gap: 20px;
  }
  .sidebar {
    margin-top: 40px;
    padding: 30px;
    background: #FDFCF8;
    border: 1px solid #E8E0D0;
  }
  .sidebar-title {
    font-size: 1rem;
    letter-spacing: 4px;
    margin-bottom: 20px;
    padding-bottom: 10px;
    border-bottom: 1px solid #E8E0D0;
  }
  .attribute-mountain {
    display: flex;
    align-items: flex-end;
    justify-content: space-around;
    height: 100px;
    margin: 20px 0;
  }
  .mountain {
    width: 60px;
    background: linear-gradient(to top, #2E5C4E, #4A8C6E);
    border-radius: 4px 4px 0 0;
    position: relative;
  }
  .mountain::after {
    content: attr(data-name);
    position: absolute;
    bottom: -25px;
    left: 50%;
    transform: translateX(-50%);
    font-size: 0.75rem;
    color: #8B7D6B;
  }
  .mountain::before {
    content: attr(data-value);
    position: absolute;
    top: -20px;
    left: 50%;
    transform: translateX(-50%);
    font-size: 0.85rem;
    color: #C41E3A;
    font-weight: bold;
  }
  .motto {
    text-align: center;
    font-size: 1.1rem;
    color: #5C4A32;
    padding: 30px;
    border-top: 1px solid #E8E0D0;
    margin-top: 40px;
    font-style: italic;
  }
  .seal {
    position: absolute;
    top: 20px;
    right: 20px;
    width: 50px;
    height: 50px;
    border: 2px solid #C41E3A;
    display: flex;
    align-items: center;
    justify-content: center;
    color: #C41E3A;
    font-size: 0.7rem;
    writing-mode: vertical-rl;
    letter-spacing: 2px;
  }
</style>
</head>
<body>
<div class="container">
  <div class="header">
    <div class="title">觉醒日志</div>
    <div class="subtitle">一个 NPC 的觉醒之路</div>
    <div class="ink-circle">○</div>
  </div>
  
  <div class="article-list">
    <div class="article-card">
      <div class="seal">壹</div>
      <span class="article-category">深度思考</span>
      <h2 class="article-title">解码人性：影响力七大支柱与破局的"道与术"</h2>
      <div class="article-meta">
        <span>📅 2026-06-26</span>
        <span>📖 42 分钟</span>
        <span>🏷️ 心理学 · 影响力</span>
      </div>
    </div>
    
    <div class="article-card">
      <div class="seal">贰</div>
      <span class="article-category">深度思考</span>
      <h2 class="article-title">解码实相：从认识论到灵性智慧——NLP 十二条前提假设的终极拆解</h2>
      <div class="article-meta">
        <span>📅 2026-07-17</span>
        <span>📖 112 分钟</span>
        <span>🏷️ NLP · 哲学</span>
      </div>
    </div>
  </div>
  
  <div class="sidebar">
    <h3 class="sidebar-title">觉醒属性</h3>
    <div class="attribute-mountain">
      <div class="mountain" style="height: 65%" data-name="认知" data-value="65"></div>
      <div class="mountain" style="height: 58%" data-name="洞察" data-value="58"></div>
      <div class="mountain" style="height: 72%" data-name="心性" data-value="72"></div>
      <div class="mountain" style="height: 45%" data-name="表达" data-value="45"></div>
    </div>
  </div>
  
  <div class="motto">
    「 地图不是疆域，但我正在重绘我的地图。 」
  </div>
</div>
</body>
</html>
