<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>方案 8：流体觉醒</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #0F0F1A;
    color: #FFFFFF;
    font-family: 'Inter', -apple-system, sans-serif;
    min-height: 100vh;
    overflow-x: hidden;
  }
  .fluid-bg {
    position: fixed;
    inset: 0;
    z-index: 0;
    overflow: hidden;
  }
  .blob {
    position: absolute;
    border-radius: 50%;
    filter: blur(80px);
    opacity: 0.4;
    animation: float 20s infinite;
  }
  .blob-1 {
    width: 400px; height: 400px;
    background: #6C5CE7;
    top: -100px; left: -100px;
  }
  .blob-2 {
    width: 300px; height: 300px;
    background: #00CEC8;
    bottom: -50px; right: -50px;
    animation-delay: -5s;
  }
  .blob-3 {
    width: 250px; height: 250px;
    background: #FD79A8;
    top: 50%; left: 50%;
    animation-delay: -10s;
  }
  @keyframes float {
    0%, 100% { transform: translate(0, 0) scale(1); }
    33% { transform: translate(30px, -30px) scale(1.1); }
    66% { transform: translate(-20px, 20px) scale(0.9); }
  }
  .container {
    position: relative;
    z-index: 1;
    max-width: 800px;
    margin: 0 auto;
    padding: 60px 20px;
  }
  .hero {
    text-align: center;
    padding: 60px 0;
  }
  .hero-shape {
    width: 200px;
    height: 200px;
    margin: 0 auto 30px;
    background: linear-gradient(135deg, #6C5CE7, #00CEC8);
    border-radius: 60% 40% 30% 70% / 60% 30% 70% 40%;
    display: flex;
    align-items: center;
    justify-content: center;
    animation: morph 8s infinite;
    box-shadow: 0 20px 60px rgba(108, 92, 231, 0.3);
  }
  @keyframes morph {
    0%, 100% { border-radius: 60% 40% 30% 70% / 60% 30% 70% 40%; }
    50% { border-radius: 30% 60% 70% 40% / 50% 60% 30% 60%; }
  }
  .hero-title {
    font-size: 2.5rem;
    font-weight: 200;
    letter-spacing: 8px;
    margin-bottom: 10px;
  }
  .hero-subtitle {
    font-size: 0.9rem;
    color: rgba(255,255,255,0.5);
    letter-spacing: 2px;
  }
  .articles {
    display: grid;
    grid-template-columns: repeat(2, 1fr);
    gap: 25px;
    margin-top: 40px;
  }
  .article {
    background: rgba(255,255,255,0.05);
    backdrop-filter: blur(20px);
    border: 1px solid rgba(255,255,255,0.1);
    border-radius: 24px;
    padding: 30px;
    transition: all 0.4s;
  }
  .article:hover {
    transform: translateY(-5px);
    background: rgba(255,255,255,0.08);
    border-color: rgba(255,255,255,0.2);
    box-shadow: 0 20px 40px rgba(0,0,0,0.2);
  }
  .article-tag {
    display: inline-block;
    background: linear-gradient(135deg, #6C5CE7, #00CEC8);
    padding: 4px 14px;
    border-radius: 20px;
    font-size: 0.75rem;
    font-weight: 600;
    margin-bottom: 15px;
  }
  .article-title {
    font-size: 1.2rem;
    font-weight: 400;
    line-height: 1.5;
    margin-bottom: 15px;
  }
  .article-meta {
    font-size: 0.85rem;
    color: rgba(255,255,255,0.5);
    display: flex;
    gap: 20px;
  }
  .attributes {
    margin-top: 50px;
    background: rgba(255,255,255,0.05);
    backdrop-filter: blur(20px);
    border: 1px solid rgba(255,255,255,0.1);
    border-radius: 24px;
    padding: 40px;
  }
  .attributes-title {
    text-align: center;
    font-size: 1rem;
    letter-spacing: 4px;
    margin-bottom: 30px;
    color: rgba(255,255,255,0.7);
  }
  .attribute-grid {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 20px;
  }
  .attribute-item {
    text-align: center;
  }
  .attribute-bubble {
    width: 80px;
    height: 80px;
    margin: 0 auto 15px;
    background: rgba(255,255,255,0.1);
    border-radius: 50%;
    position: relative;
    overflow: hidden;
    border: 2px solid rgba(255,255,255,0.2);
  }
  .attribute-liquid {
    position: absolute;
    bottom: 0;
    left: 0;
    right: 0;
    background: linear-gradient(180deg, #6C5CE7, #00CEC8);
    transition: height 1.5s ease;
  }
  .attribute-icon {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    font-size: 1.5rem;
    z-index: 1;
  }
  .attribute-name {
    font-size: 0.85rem;
    color: rgba(255,255,255,0.6);
    margin-bottom: 5px;
  }
  .attribute-value {
    font-size: 1.1rem;
    font-weight: 600;
    color: #00CEC8;
  }
  .motto {
    margin-top: 50px;
    text-align: center;
    font-size: 0.95rem;
    color: rgba(255,255,255,0.4);
    font-style: italic;
    letter-spacing: 1px;
  }
</style>
</head>
<body>
<div class="fluid-bg">
  <div class="blob blob-1"></div>
  <div class="blob blob-2"></div>
  <div class="blob blob-3"></div>
</div>
<div class="container">
  <div class="hero">
    <div class="hero-shape">
      <span style="font-size: 3rem;">⚡</span>
    </div>
    <div class="hero-title">JustNPC</div>
    <div class="hero-subtitle">流体觉醒中</div>
  </div>
  
  <div class="articles">
    <div class="article">
      <div class="article-tag">深度思考</div>
      <div class="article-title">解码人性：影响力七大支柱与破局的"道与术"</div>
      <div class="article-meta">
        <span>2026-06-26</span>
        <span>42 min</span>
      </div>
    </div>
    <div class="article">
      <div class="article-tag">深度思考</div>
      <div class="article-title">解码实相：从认识论到灵性智慧</div>
      <div class="article-meta">
        <span>2026-07-17</span>
        <span>112 min</span>
      </div>
    </div>
  </div>
  
  <div class="attributes">
    <div class="attributes-title">觉 醒 属 性</div>
    <div class="attribute-grid">
      <div class="attribute-item">
        <div class="attribute-bubble">
          <div class="attribute-liquid" style="height: 65%"></div>
          <div class="attribute-icon">🧠</div>
        </div>
        <div class="attribute-name">认知</div>
        <div class="attribute-value">65</div>
      </div>
      <div class="attribute-item">
        <div class="attribute-bubble">
          <div class="attribute-liquid" style="height: 58%"></div>
          <div class="attribute-icon">👁️</div>
        </div>
        <div class="attribute-name">洞察</div>
        <div class="attribute-value">58</div>
      </div>
      <div class="attribute-item">
        <div class="attribute-bubble">
          <div class="attribute-liquid" style="height: 72%"></div>
          <div class="attribute-icon">🧘</div>
        </div>
        <div class="attribute-name">心性</div>
        <div class="attribute-value">72</div>
      </div>
      <div class="attribute-item">
        <div class="attribute-bubble">
          <div class="attribute-liquid" style="height: 45%"></div>
          <div class="attribute-icon">✍️</div>
        </div>
        <div class="attribute-name">表达</div>
        <div class="attribute-value">45</div>
      </div>
    </div>
  </div>
  
  <div class="motto">
    "地图不是疆域，但我正在重绘我的地图。"
  </div>
</div>
</body>
</html>
