<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>方案 5：手账觉醒</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #FFF8E7;
    color: #5D4E37;
    font-family: 'Segoe Print', 'Bradley Hand', cursive, 'Noto Sans SC', sans-serif;
    line-height: 1.8;
    padding: 20px;
  }
  .journal {
    max-width: 700px;
    margin: 0 auto;
    background: #FFFEF5;
    border-radius: 4px;
    box-shadow: 0 4px 20px rgba(93, 78, 55, 0.15);
    overflow: hidden;
    position: relative;
  }
  .tape {
    position: absolute;
    width: 80px;
    height: 25px;
    background: rgba(224, 122, 95, 0.6);
    top: -12px;
    left: 50%;
    transform: translateX(-50%) rotate(-2deg);
    border-radius: 2px;
  }
  .journal-header {
    padding: 40px 40px 20px;
    text-align: center;
    border-bottom: 2px dashed #D4C5B0;
  }
  .journal-title {
    font-size: 2rem;
    color: #5D4E37;
    margin-bottom: 10px;
  }
  .journal-date {
    font-size: 0.9rem;
    color: #A08B6D;
  }
  .journal-weather {
    display: inline-block;
    margin-left: 10px;
    padding: 2px 10px;
    background: #81B29A;
    color: #FFF;
    border-radius: 12px;
    font-size: 0.8rem;
  }
  .entries {
    padding: 30px 40px;
  }
  .entry {
    display: flex;
    gap: 20px;
    margin-bottom: 30px;
    padding: 20px;
    background: #FFF;
    border-radius: 8px;
    box-shadow: 2px 2px 8px rgba(0,0,0,0.05);
    position: relative;
    transition: transform 0.2s;
  }
  .entry:hover {
    transform: rotate(-1deg) scale(1.02);
    box-shadow: 4px 4px 12px rgba(0,0,0,0.1);
  }
  .entry-sticker {
    width: 60px;
    height: 60px;
    background: linear-gradient(135deg, #E07A5F, #F4A261);
    border-radius: 8px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 1.8rem;
    flex-shrink: 0;
    box-shadow: 2px 2px 6px rgba(0,0,0,0.1);
  }
  .entry-content h3 {
    font-size: 1.1rem;
    color: #5D4E37;
    margin-bottom: 8px;
    line-height: 1.4;
  }
  .entry-content p {
    font-size: 0.9rem;
    color: #A08B6D;
    line-height: 1.6;
  }
  .entry-meta {
    display: flex;
    gap: 15px;
    margin-top: 10px;
    font-size: 0.8rem;
    color: #C4A77D;
  }
  .attributes {
    margin: 30px 40px;
    padding: 25px;
    background: #FFF;
    border-radius: 8px;
    border: 2px dashed #D4C5B0;
  }
  .attributes-title {
    font-size: 1rem;
    color: #5D4E37;
    margin-bottom: 20px;
    display: flex;
    align-items: center;
    gap: 10px;
  }
  .attribute-row {
    display: flex;
    align-items: center;
    gap: 12px;
    margin: 12px 0;
  }
  .attribute-emoji {
    font-size: 1.2rem;
    width: 30px;
  }
  .attribute-name {
    width: 50px;
    font-size: 0.9rem;
  }
  .attribute-stickers {
    flex: 1;
    display: flex;
    gap: 4px;
  }
  .sticker {
    width: 16px;
    height: 16px;
    border-radius: 50%;
    background: #E8E0D0;
  }
  .sticker.filled {
    background: linear-gradient(135deg, #E07A5F, #F4A261);
  }
  .attribute-value {
    width: 35px;
    text-align: right;
    font-size: 0.85rem;
    color: #E07A5F;
    font-weight: bold;
  }
  .motto {
    margin: 20px 40px 40px;
    padding: 20px;
    text-align: center;
    font-size: 1rem;
    color: #A08B6D;
    border-top: 2px dashed #D4C5B0;
    font-style: italic;
  }
  .paperclip {
    position: absolute;
    top: 20px;
    right: 30px;
    font-size: 1.5rem;
    transform: rotate(45deg);
  }
</style>
</head>

<div class="journal">

        <div class="sticker filled"></div>

    <div class="attribute-row">

  </div>

  </div>
</div>
</body>
</html>
