<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>方案 7：档案觉醒</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #F4E4C1;
    color: #2C1810;
    font-family: 'Courier Prime', 'Courier New', monospace;
    line-height: 1.7;
    padding: 20px;
  }
  .archive {
    max-width: 800px;
    margin: 0 auto;
  }
  .archive-header {
    text-align: center;
    padding: 40px;
    border: 3px double #8B0000;
    background: #F9EDD5;
    margin-bottom: 30px;
    position: relative;
  }
  .archive-header::before {
    content: '档案室';
    position: absolute;
    top: 10px;
    left: 10px;
    font-size: 0.7rem;
    color: #8B0000;
    border: 1px solid #8B0000;
    padding: 2px 8px;
  }
  .archive-title {
    font-size: 2rem;
    letter-spacing: 8px;
    color: #8B0000;
    margin-bottom: 10px;
  }
  .archive-subtitle {
    font-size: 0.9rem;
    color: #6B5D4F;
    letter-spacing: 2px;
  }
  .card-catalog {
    display: grid;
    grid-template-columns: repeat(2, 1fr);
    gap: 20px;
  }
  .catalog-card {
    background: #F9EDD5;
    border: 2px solid #8B4513;
    padding: 20px;
    position: relative;
    box-shadow: 3px 3px 0 #D4C5B0;
    transition: all 0.2s;
  }
  .catalog-card:hover {
    transform: translate(-2px, -2px);
    box-shadow: 5px 5px 0 #D4C5B0;
  }
  .card-hole {
    position: absolute;
    bottom: 15px;
    left: 50%;
    transform: translateX(-50%);
    width: 15px;
    height: 15px;
    border-radius: 50%;
    border: 2px solid #8B4513;
    background: #F4E4C1;
  }
  .card-number {
    font-size: 0.7rem;
    color: #8B0000;
    margin-bottom: 8px;
    letter-spacing: 1px;
  }
  .card-title {
    font-size: 1rem;
    font-weight: bold;
    line-height: 1.5;
    margin-bottom: 12px;
    border-bottom: 1px solid #D4C5B0;
    padding-bottom: 10px;
  }
  .card-meta {
    font-size: 0.75rem;
    color: #6B5D4F;
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 5px;
  }
  .card-stamp {
    position: absolute;
    top: 15px;
    right: 15px;
    width: 60px;
    height: 60px;
    border: 2px solid #8B0000;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 0.6rem;
    color: #8B0000;
    transform: rotate(15deg);
    opacity: 0.7;
  }
  .drawers {
    margin-top: 40px;
    background: #8B4513;
    padding: 20px;
    border-radius: 4px;
  }
  .drawers-title {
    color: #F4E4C1;
    font-size: 1rem;
    letter-spacing: 4px;
    margin-bottom: 15px;
    text-align: center;
  }
  .drawer-row {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 10px;
  }
  .drawer {
    background: #D4A574;
    border: 2px solid #6B3410;
    padding: 15px 10px;
    text-align: center;
    position: relative;
  }
  .drawer-label {
    background: #F9EDD5;
    border: 1px solid #8B4513;
    padding: 5px;
    font-size: 0.7rem;
    margin-bottom: 8px;
  }
  .drawer-value {
    font-size: 1.2rem;
    font-weight: bold;
    color: #8B0000;
  }
  .motto {
    margin-top: 30px;
    text-align: center;
    padding: 20px;
    border: 2px solid #8B4513;
    background: #F9EDD5;
    font-size: 0.9rem;
    color: #6B5D4F;
    letter-spacing: 2px;
  }
</style>
</head>
<body>
<div class="archive">
  <div class="archive-header">
    <div class="archive-title">觉醒档案</div>
    <div class="archive-subtitle">NPC 认知升级记录 · 第壹卷</div>
  </div>
  
  <div class="card-catalog">
    <div class="catalog-card">
      <div class="card-stamp">已觉醒</div>
      <div class="card-number">档案编号：NPC-2026-001</div>
      <div class="card-title">解码人性：影响力七大支柱与破局的"道与术"</div>
      <div class="card-meta">
        <span>分类：深度思考</span>
        <span>密级：公开</span>
        <span>日期：2026-06-26</span>
        <span>页数：42页</span>
      </div>
      <div class="card-hole"></div>
    </div>
    
    <div class="catalog-card">
      <div class="card-stamp">已觉醒</div>
      <div class="card-number">档案编号：NPC-2026-002</div>
      <div class="card-title">解码实相：从认识论到灵性智慧——NLP 十二条前提假设的终极拆解</div>
      <div class="card-meta">
        <span>分类：深度思考</span>
        <span>密级：公开</span>
        <span>日期：2026-07-17</span>
        <span>页数：112页</span>
      </div>
      <div class="card-hole"></div>
    </div>
  </div>
  
  <div class="drawers">
    <div class="drawers-title">属性档案柜</div>
    <div class="drawer-row">
      <div class="drawer">
        <div class="drawer-label">🧠 认知</div>
        <div class="drawer-value">65</div>
      </div>
      <div class="drawer">
        <div class="drawer-label">👁️ 洞察</div>
        <div class="drawer-value">58</div>
      </div>
      <div class="drawer">
        <div class="drawer-label">🧘 心性</div>
        <div class="drawer-value">72</div>
      </div>
      <div class="drawer">
        <div class="drawer-label">✍️ 表达</div>
        <div class="drawer-value">45</div>
      </div>
    </div>
  </div>
  
  <div class="motto">
    「 地图不是疆域，但我正在重绘我的地图。 」
  </div>
</div>
</body>
</html>
