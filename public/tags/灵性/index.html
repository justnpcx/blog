  <script>
    document.addEventListener('DOMContentLoaded', function() {
      
      var themeToggle = document.querySelector('.theme-toggle');
      if (themeToggle) {
        var defaultColorScheme = 'retro';
        function getEffectiveTheme() {
          return localStorage.getItem('theme') || defaultColorScheme;
        }

        themeToggle.addEventListener('click', function() {
          var current = getEffectiveTheme();
          var order = ['light', 'dark', 'retro'];
          var idx = order.indexOf(current);
          var next = order[(idx + 1) % order.length];
          document.documentElement.setAttribute('data-theme', next);
          localStorage.setItem('theme', next);
          try { window.dispatchEvent(new Event('themechange')); } catch (_) {}
        });
      }

      
      var dropdown = document.querySelector('.lang-dropdown');
      if (dropdown) {
        var langToggle = dropdown.querySelector('.lang-toggle');

        langToggle.addEventListener('click', function(e) {
          e.stopPropagation();
          dropdown.classList.toggle('open');
          langToggle.setAttribute('aria-expanded', dropdown.classList.contains('open'));
        });

        document.addEventListener('click', function(e) {
          if (!dropdown.contains(e.target)) {
            dropdown.classList.remove('open');
            langToggle.setAttribute('aria-expanded', 'false');
          }
        });
      }
    });
  </script></body>
