baseURL: https://blog.justnpc.com/
title: JUSTNPC.EXE
theme: hugo-theme-stack
defaultContentLanguage: zh-cn
hasCJKLanguage: true
locale: zh-cn

enableInlineShortcodes: true
enableEmoji: true
enableRobotsTXT: true

pagination:
  pagerSize: 6

permalinks:
  posts: "/p/:slug/"
  page: "/:slug/"

outputs:
  home:
    - HTML
    - RSS

params:
  mainSections: [posts]
  rssFullContent: true
  favicon: img/avatar.png

  description: "NPC 觉醒笔记：解码人性、认知跃迁与科技观察"
  author: justnpc

  # 赛博朋克风格配置
  sidebar:
    emoji: "⚡"
    subtitle: "AWAKENING // 智慧 · 科技 · 分享"
    avatar: img/avatar.png
    siteUrl: "blog.justnpc.com"

  article:
    headingSize: 6
    toc: true
    license:
      enabled: false

  footer:
    since: 2026
    customText: "CRAFTED_WITH ◆ BY JUSTNPC // CYBER_AWAKENING"

  dateFormat:
    published: "2006-01-02"
    lastUpdated: "2006-01-02 15:04"

  # 右侧栏
  widgets:
    homepage:
      - type: archives
        params:
          limit: 5
      - type: categories
        params:
          limit: 10
      - type: tag-cloud
        params:
          limit: 12
    page:
      - type: toc

  # 评论
  comments:
    enabled: true
    provider: giscus
    giscus:
      repo: justnpc/blog-site
      repoID: REPLACE_ME
      category: General
      categoryID: REPLACE_ME
      mapping: pathname
      strict: 0
      reactionsEnabled: 1
      emitMetadata: 0
      inputPosition: top
      lightTheme: light
      darkTheme: dark
      lang: zh-CN
      loading: lazy

  # NPC 属性（属性能量条）
  attributes:
    - name: COGNITION
      icon: 🧠
      value: 65
    - name: INSIGHT
      icon: 👁️
      value: 58
    - name: MINDSET
      icon: 🧘
      value: 72
    - name: EXPRESSION
      icon: ✍️
      value: 45

  # 座右铭
  motto: "THE MAP IS NOT THE TERRITORY, BUT I'M REDRAWING MY MAP."

  # 系统状态
  systemStatus:
    awaken: 23
    uptime: "21 DAYS"

menu:
  main:
    - identifier: home
      name: POSTS
      url: /
      weight: -100
    - identifier: categories
      name: CATEGORIES
      url: /categories/
      weight: -80
    - identifier: tags
      name: TAGS
      url: /tags/
      weight: -70
    - identifier: about
      name: ABOUT
      url: /about/
      weight: -60

  social:
    - identifier: github
      name: GitHub
      url: https://github.com/justnpc
      params:
        icon: brand-github

taxonomies:
  category: categories
  tag: tags

markup:
  highlight:
    noClasses: false
    codeFences: true
    guessSyntax: true
    style: monokai
  goldmark:
    renderer:
      unsafe: true

related:
  includeNewer: true
  threshold: 60
  indices:
    - name: tags
      weight: 100
    - name: categories
      weight: 200
